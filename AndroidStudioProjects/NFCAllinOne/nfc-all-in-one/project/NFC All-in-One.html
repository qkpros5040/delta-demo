<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NFC All-in-One — Android Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; background: #0a0d0c;
    font-family: 'Roboto', system-ui, sans-serif;
    color: #e6efe9;
  }
  * { box-sizing: border-box; }
  /* Override mono fonts */
  [style*="ui-monospace"] { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace !important; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakSlider } = window;
const { Onboarding, Home, ReadScanning, ReadResult, Write, Clone, History, Settings, TagDetail, T } = window.NFC;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "mint",
  "density": "comfortable",
  "scanAnimation": "radar"
}/*EDITMODE-END*/;

const ACCENTS = {
  mint:    { accent: '#7af0c4', accentDeep: '#0c8d68', accentInk: '#003328' },
  cyber:   { accent: '#7ad7ff', accentDeep: '#1c7fb3', accentInk: '#001f33' },
  amber:   { accent: '#f5c87a', accentDeep: '#a4711b', accentInk: '#2b1c00' },
  magenta: { accent: '#f59ad7', accentDeep: '#a83488', accentInk: '#330024' },
  lime:    { accent: '#caf06d', accentDeep: '#618c12', accentInk: '#1a2400' },
};

function withAccent(base, accentKey) {
  const a = ACCENTS[accentKey] || ACCENTS.mint;
  return { ...base, ...a };
}

function Phone({ label, screen, t, density, scanAnimation, dark }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10 }}>
      <window.AndroidDevice width={360} height={760} dark={dark}>
        {React.cloneElement(screen, { t, density, animation: scanAnimation })}
      </window.AndroidDevice>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const dark = tweaks.theme === 'dark';
  const baseTheme = T(dark ? 'dark' : 'light');
  const t = withAccent(baseTheme, tweaks.accent);
  const phoneProps = { t, density: tweaks.density, scanAnimation: tweaks.scanAnimation, dark };

  return (
    <>
      <window.DesignCanvas storageKey="nfc-aio-canvas" background="#0a0d0c">
        <window.DCSection id="flow" title="NFC All-in-One" subtitle="Android · Material 3 · Dark + mint">
          <window.DCArtboard id="onboarding" label="01 · Onboarding" width={380} height={800}>
            <Phone {...phoneProps} screen={<Onboarding/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="home" label="02 · Home" width={380} height={800}>
            <Phone {...phoneProps} screen={<Home/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="read-scan" label="03 · Read · scanning" width={380} height={800}>
            <Phone {...phoneProps} screen={<ReadScanning/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="read-result" label="04 · Read · result" width={380} height={800}>
            <Phone {...phoneProps} screen={<ReadResult/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="write" label="05 · Write · compose" width={380} height={800}>
            <Phone {...phoneProps} screen={<Write/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="clone" label="06 · Clone · source→target" width={380} height={800}>
            <Phone {...phoneProps} screen={<Clone/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="tag-detail" label="07 · Tag detail" width={380} height={800}>
            <Phone {...phoneProps} screen={<TagDetail/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="history" label="08 · History" width={380} height={800}>
            <Phone {...phoneProps} screen={<History/>}/>
          </window.DCArtboard>
          <window.DCArtboard id="settings" label="09 · Settings" width={380} height={800}>
            <Phone {...phoneProps} screen={<Settings/>}/>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Appearance">
          <TweakRadio label="Theme" value={tweaks.theme}
            onChange={(v) => setTweak('theme', v)}
            options={[{value:'dark',label:'Dark'},{value:'light',label:'Light'}]}/>
          <TweakSelect label="Accent" value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              {value:'mint',label:'Mint'},
              {value:'cyber',label:'Cyber blue'},
              {value:'amber',label:'Amber'},
              {value:'magenta',label:'Magenta'},
              {value:'lime',label:'Lime'},
            ]}/>
          <TweakRadio label="Density" value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[{value:'comfortable',label:'Comfortable'},{value:'compact',label:'Compact'}]}/>
        </TweakSection>
        <TweakSection title="Scan">
          <TweakRadio label="Scan animation" value={tweaks.scanAnimation}
            onChange={(v) => setTweak('scanAnimation', v)}
            options={[{value:'radar',label:'Radar'},{value:'wave',label:'Waveform'}]}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
